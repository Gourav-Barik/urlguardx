# ============================================================
# URLGuardX - Clean Configuration
# ============================================================

# ---------- SERVER ----------
server.port=${PORT:10000}



# ---------- EXTERNAL SERVICES ----------
ML_SERVICE_URL=${ML_SERVICE_URL}

gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent}
gemini.api.key=${GEMINI_API_KEY}

whois.api.url=https://www.whoisxmlapi.com/whoisserver/WhoisService
whois.api.key=${WHOIS_API_KEY}

google.safe.api.url=https://safebrowsing.googleapis.com/v4/threatMatches:find
google.safe.api.key=${GOOGLE_SAFE_API_KEY}


# ---------- FEATURES ----------
urlhaus.feed.enabled=true


# ---------- RISK ENGINE ----------
risk.weight.lexical=0.30
risk.weight.blacklist=0.35
risk.weight.ssl=0.20
risk.weight.domain=0.15


# ---------- CORS ----------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}


# ---------- TIMEOUT ----------
# 90s: accommodates Render free-tier ML cold-start (can take 30-60s to wake)
spring.mvc.async.request-timeout=60000


# ---------- LOGGING ----------
logging.level.com.fyrp.urlguardx=INFO
# Reduce Hibernate/HikariCP noise in production
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.zaxxer.hikari=WARN
