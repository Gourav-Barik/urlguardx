services:
  # ----------------------------------------
  # 1. MACHINE LEARNING SERVICE
  # ----------------------------------------
  - type: web
    name: urlguardx-mls
    runtime: docker
    dockerContext: ./ml-service
    dockerfilePath: ./ml-service/Dockerfile
    envVars:
      - key: PORT
        value: 10000

  # ----------------------------------------
  # 2. JAVA SPRING BOOT BACKEND
  # ----------------------------------------
  - type: web
    name: urlguardx-b
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: ML_SERVICE_URL
        value: https://urlguardx-mls.onrender.com/predict
      - key: CORS_ALLOWED_ORIGINS
        value: https://urlguardx.onrender.com
      - key: GEMINI_API_KEY
        sync: false
      - key: WHOIS_API_KEY
        sync: false
      - key: GOOGLE_SAFE_API_KEY
        sync: false

  # ----------------------------------------
  # 3. REACT FRONTEND (STATIC SITE)
  # ----------------------------------------
  - type: web
    name: urlguardx
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://urlguardx-b.onrender.com
